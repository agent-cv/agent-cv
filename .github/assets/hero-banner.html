<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-cv hero banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap");

      @font-face {
        font-family: "Geist Sans";
        src: url("./fonts/Geist-Variable.woff2") format("woff2");
        font-weight: 100 900;
        font-style: normal;
      }

      @font-face {
        font-family: "Geist Mono";
        src: url("./fonts/GeistMono-Variable.woff2") format("woff2");
        font-weight: 100 900;
        font-style: normal;
      }

      @font-face {
        font-family: "Geist Pixel Line";
        src: url("./fonts/GeistPixel-Line.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
      }

      :root {
        --banner-width: 1024px;
        --banner-height: 273px;
        --bg: #fefefe;
        --border: #e9ecf2;
        --text: #0c0c0c;
        --text-secondary: #767d88;
        --font-inter: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-geist-sans: "Geist Sans", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-geist-mono: "Geist Mono", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --font-geist-pixel-line: "Geist Pixel Line", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: var(--banner-width);
        height: var(--banner-height);
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: var(--font-inter);
      }

      #banner {
        width: var(--banner-width);
        height: var(--banner-height);
      }

      body:not(.ready) #banner {
        opacity: 0;
      }

      .hero-logo-inline {
        font-weight: 700;
        font-family: var(--font-geist-mono);
        background: linear-gradient(90deg, #ff6b6b, #ffa500, #ffd700, #4ecdc4, #45b7d1, #9966cc, #ff6b9d, #ff6b6b);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        animation: hero-shimmer 3s linear infinite;
      }

      @keyframes hero-shimmer {
        0% {
          background-position: 200% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body>
    <main id="banner" class="border-2 border-[var(--border)] rounded-2xl bg-[var(--bg)] flex items-center justify-center">
      <section class="max-w-[900px] w-full mx-auto px-6 py-6 text-center">
        <p class="text-[15px] font-medium text-[var(--text-secondary)] uppercase tracking-[0.35px] mb-5">
          Developer Profile Generator
        </p>
        <h1 class="text-[50px] font-bold leading-[1.12] tracking-[-1.3px] text-[var(--text)] mb-4" style="font-family: var(--font-geist-sans);">
          One command.<br />Your <span class="inline-block translate-y-[1px] text-[1.08em] font-normal not-italic" style="font-family: var(--font-geist-pixel-line);">profile</span> is ready.
        </h1>
        <p class="text-[38px] leading-none mt-2" style="font-family: var(--font-geist-mono); font-weight: 700;">
          <span class="hero-logo-inline">agent-cv</span>
        </p>
      </section>
    </main>
    <script>
      Promise.resolve(document.fonts ? document.fonts.ready : undefined)
        .catch(() => {})
        .finally(() => {
          setTimeout(() => document.body.classList.add("ready"), 120);
        });
    </script>
  </body>
</html>
