name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:npm
      - run: bun test
      - uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: agent-cv-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: agent-cv-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: agent-cv-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build src/cli.ts --compile --outfile dist/${{ matrix.artifact }} --minify --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  create-release:
    needs: [publish-npm, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/agent-cv-darwin-arm64/agent-cv-darwin-arm64
            artifacts/agent-cv-darwin-x64/agent-cv-darwin-x64
            artifacts/agent-cv-linux-x64/agent-cv-linux-x64
          generate_release_notes: true

  update-homebrew:
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download binaries and compute checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE="https://github.com/agent-cv/agent-cv/releases/download/v${VERSION}"

          curl -sL "${BASE}/agent-cv-darwin-arm64" -o darwin-arm64
          curl -sL "${BASE}/agent-cv-darwin-x64" -o darwin-x64
          curl -sL "${BASE}/agent-cv-linux-x64" -o linux-x64

          echo "sha_darwin_arm64=$(sha256sum darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha_darwin_x64=$(sha256sum darwin-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "sha_linux_x64=$(sha256sum linux-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        id: checksums

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: agent-cv/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cat > Formula/agent-cv.rb << 'FORMULA'
          class AgentCv < Formula
            desc "Generate technical CVs from your local project directories using AI"
            homepage "https://agent-cv.dev"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/agent-cv/agent-cv/releases/download/vVERSION_PLACEHOLDER/agent-cv-darwin-arm64"
                sha256 "SHA_DARWIN_ARM64"

                def install
                  bin.install "agent-cv-darwin-arm64" => "agent-cv"
                end
              else
                url "https://github.com/agent-cv/agent-cv/releases/download/vVERSION_PLACEHOLDER/agent-cv-darwin-x64"
                sha256 "SHA_DARWIN_X64"

                def install
                  bin.install "agent-cv-darwin-x64" => "agent-cv"
                end
              end
            end

            on_linux do
              url "https://github.com/agent-cv/agent-cv/releases/download/vVERSION_PLACEHOLDER/agent-cv-linux-x64"
              sha256 "SHA_LINUX_X64"

              def install
                bin.install "agent-cv-linux-x64" => "agent-cv"
              end
            end

            test do
              assert_match "agent-cv", shell_output("#{bin}/agent-cv --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/agent-cv.rb
          sed -i "s/SHA_DARWIN_ARM64/${{ steps.checksums.outputs.sha_darwin_arm64 }}/g" Formula/agent-cv.rb
          sed -i "s/SHA_DARWIN_X64/${{ steps.checksums.outputs.sha_darwin_x64 }}/g" Formula/agent-cv.rb
          sed -i "s/SHA_LINUX_X64/${{ steps.checksums.outputs.sha_linux_x64 }}/g" Formula/agent-cv.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-cv.rb
          git commit -m "Update agent-cv to ${{ steps.version.outputs.version }}"
          git push
